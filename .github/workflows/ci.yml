name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck bats-core

      - name: Build
        run: ./build.sh

      - name: Syntax check
        run: bash -n zmenu.sh

      - name: Static analysis
        run: shellcheck -S warning zmenu.sh

      - name: Run tests
        run: bats tests/

      - name: Headless smoke test
        run: |
          unset TERM
          echo "" | ./zmenu.sh --run dashboard | grep -q "DASHBOARD"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: zmenu
          path: zmenu.sh
